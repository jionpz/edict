version: '3.8'

services:
  edict-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.hot
    working_dir: /app
    network_mode: host
    user: "1001:1001"
    environment:
      - HOME=/home/jionpz
      - PATH=/home/jionpz/.nvm/versions/node/v24.13.0/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENCLAW_GATEWAY_BASE=http://127.0.0.1:18789
      - EDICT_SHOW_OC_TASKS=0
    volumes:
      - ./:/app
      - /home/jionpz/.openclaw:/home/jionpz/.openclaw:rw
      - /home/jionpz/.nvm:/home/jionpz/.nvm:ro
    command: >
      watchfiles --filter python
      "python3 dashboard/server.py --host 0.0.0.0 --port 7891"
    restart: unless-stopped

  edict-loop:
    build:
      context: .
      dockerfile: docker/Dockerfile.hot
    working_dir: /app
    network_mode: host
    user: "1001:1001"
    environment:
      - HOME=/home/jionpz
      - DASHBOARD_BASE=http://127.0.0.1:7891
      - EDICT_SHOW_OC_TASKS=0
    volumes:
      - ./:/app
      - /home/jionpz/.openclaw:/home/jionpz/.openclaw:rw
      - /home/jionpz/.nvm:/home/jionpz/.nvm:ro
    command: bash scripts/run_loop.sh 15 120
    depends_on:
      - edict-dashboard
    restart: unless-stopped

  edict-frontend:
    image: node:20-alpine
    working_dir: /app/edict/frontend
    volumes:
      - ./:/app
      - node_modules:/app/edict/frontend/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  node_modules:
